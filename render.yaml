services:
  - type: web
    name: plannipro
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --worker-class sync --max-requests 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
