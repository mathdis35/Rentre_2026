services:
  - type: web
    name: plannipro
    env: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y libreoffice --no-install-recommends || true
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
