services:
  - type: web
    name: plannipro
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 900 --workers 1 --worker-class gthread --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
